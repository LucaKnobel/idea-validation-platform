info:
  name: Get current session and user
  type: http
  seq: 1
  tags:
    - Auth

http:
  method: GET
  url: "{{baseUrl}}/auth/get-session"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Session payload
    request:
      url: "{{baseUrl}}/auth/get-session"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "session": {},
            "user": {}
          }
  - name: 401 Response
    description: Invalid or missing session
    request:
      url: "{{baseUrl}}/auth/get-session"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "INVALID_REQUEST_BODY",
            "message": "Invalid request body"
          }
