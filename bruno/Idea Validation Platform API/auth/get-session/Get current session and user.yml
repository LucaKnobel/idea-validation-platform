info:
  name: Get current session and user
  type: http
  seq: 1
  tags:
    - Auth

http:
  method: GET
  url: "{{baseUrl}}/auth/get-session"
  headers:
    - name: better-auth.session_token
      value: "{{apiKey}}"
  auth:
    type: apikey
    key: better-auth.session_token
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Session payload returned (or null fields when no active session)
    request:
      url: "{{baseUrl}}/auth/get-session"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "session": {},
            "user": {}
          }
  - name: 401 Response
    description: Invalid or missing session cookie
    request:
      url: "{{baseUrl}}/auth/get-session"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "INVALID_REQUEST_BODY",
            "message": "Invalid request body"
          }
