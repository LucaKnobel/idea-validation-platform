info:
  name: Sign in with email and password
  type: http
  seq: 1
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/auth/sign-in/email"
  headers:
    - name: Origin
      value: ""
      description: Request origin. Must match a trusted origin configured by the server.
    - name: Referer
      value: ""
      description: Request referer. Must belong to a trusted origin.
  body:
    type: json
    data: |-
      {
        "email": "",
        "password": "",
        "rememberMe": false,
        "callbackURL": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Sign-in succeeded and session cookie is issued
    request:
      url: "{{baseUrl}}/auth/sign-in/email"
      method: POST
      headers:
        - name: Origin
          value: ""
          description: Request origin. Must match a trusted origin configured by the server.
        - name: Referer
          value: ""
          description: Request referer. Must belong to a trusted origin.
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": "",
            "rememberMe": false,
            "callbackURL": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": true,
            "message": "Request accepted"
