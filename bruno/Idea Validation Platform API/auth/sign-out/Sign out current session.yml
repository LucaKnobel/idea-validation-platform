info:
  name: Sign out current session
  type: http
  seq: 1
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/auth/sign-out"
  headers:
    - name: Origin
      value: ""
      description: Request origin. Must match a trusted origin configured by the server.
    - name: Referer
      value: ""
      description: Request referer. Must belong to a trusted origin.
    - name: better-auth.session_token
      value: "{{apiKey}}"
  body:
    type: json
    data: "{}"
  auth:
    type: apikey
    key: better-auth.session_token
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Sign-out succeeded
    request:
      url: "{{baseUrl}}/auth/sign-out"
      method: POST
      headers:
        - name: Origin
          value: ""
          description: Request origin. Must match a trusted origin configured by the server.
        - name: Referer
          value: ""
          description: Request referer. Must belong to a trusted origin.
        - name: better-auth.session_token
          value: "{{apiKey}}"
      body:
        type: json
        data: "{}"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": true,
            "message": "Request accepted"
          }
  - name: 400 Response
    description: Missing or untrusted origin context
    request:
      url: "{{baseUrl}}/auth/sign-out"
      method: POST
      headers:
        - name: Origin
          value: ""
          description: Request origin. Must match a trusted origin configured by the server.
        - name: Referer
          value: ""
          description: Request referer. Must belong to a trusted origin.
        - name: better-auth.session_token
          value: "{{apiKey}}"
      body:
        type: json
        data: "{}"
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "INVALID_REQUEST_BODY",
            "message": "Invalid request body"
          }
  - name: 401 Response
    description: No active session
    request:
      url: "{{baseUrl}}/auth/sign-out"
      method: POST
      headers:
        - name: Origin
          value: ""
          description: Request origin. Must match a trusted origin configured by the server.
        - name: Referer
          value: ""
          description: Request referer. Must belong to a trusted origin.
        - name: better-auth.session_token
          value: "{{apiKey}}"
      body:
        type: json
        data: "{}"
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "INVALID_REQUEST_BODY",
            "message": "Invalid request body"
          }
  - name: 429 Response
    description: Too many requests
    request:
      url: "{{baseUrl}}/auth/sign-out"
      method: POST
      headers:
        - name: Origin
          value: ""
          description: Request origin. Must match a trusted origin configured by the server.
        - name: Referer
          value: ""
          description: Request referer. Must belong to a trusted origin.
        - name: better-auth.session_token
          value: "{{apiKey}}"
      body:
        type: json
        data: "{}"
    response:
      status: 429
      statusText: Too Many Requests
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "INVALID_REQUEST_BODY",
            "message": "Invalid request body"
          }

docs: |
  Invalidates the current session.
  This state-changing endpoint requires trusted `Origin` and `Referer` headers.
