info:
  name: Reset password with token
  type: http
  seq: 1
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/auth/reset-password"
  body:
    type: json
    data: |-
      {
        "newPassword": "",
        "token": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Password reset succeeded
    request:
      url: "{{baseUrl}}/auth/reset-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "newPassword": "",
            "token": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": true,
            "message": "Request accepted"
          }
  - name: 400 Response
    description: Invalid request body or token
    request:
      url: "{{baseUrl}}/auth/reset-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "newPassword": "",
            "token": ""
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "INVALID_REQUEST_BODY",
            "message": "Invalid request body"
          }
  - name: 429 Response
    description: Too many requests
    request:
      url: "{{baseUrl}}/auth/reset-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "newPassword": "",
            "token": ""
          }
    response:
      status: 429
      statusText: Too Many Requests
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "INVALID_REQUEST_BODY",
            "message": "Invalid request body"
          }
