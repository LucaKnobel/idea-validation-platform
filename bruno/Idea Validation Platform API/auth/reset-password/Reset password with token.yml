info:
  name: Reset password with token
  type: http
  seq: 1
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/auth/reset-password"
  headers:
    - name: Origin
      value: ""
      description: Request origin. Must match a trusted origin configured by the server.
    - name: Referer
      value: ""
      description: Request referer. Must belong to a trusted origin.
  body:
    type: json
    data: |-
      {
        "newPassword": "",
        "token": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Password reset succeeded
    request:
      url: "{{baseUrl}}/auth/reset-password"
      method: POST
      headers:
        - name: Origin
          value: ""
          description: Request origin. Must match a trusted origin configured by the server.
        - name: Referer
          value: ""
          description: Request referer. Must belong to a trusted origin.
      body:
        type: json
        data: |-
          {
            "newPassword": "",
            "token": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": true,
            "message": "Request accepted"
          }
  - name: 400 Response
    description: Invalid request body, token, or missing/untrusted origin context
    request:
      url: "{{baseUrl}}/auth/reset-password"
      method: POST
      headers:
        - name: Origin
          value: ""
          description: Request origin. Must match a trusted origin configured by the server.
        - name: Referer
          value: ""
          description: Request referer. Must belong to a trusted origin.
      body:
        type: json
        data: |-
          {
            "newPassword": "",
            "token": ""
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "INVALID_REQUEST_BODY",
            "message": "Invalid request body"
          }
  - name: 429 Response
    description: Too many requests
    request:
      url: "{{baseUrl}}/auth/reset-password"
      method: POST
      headers:
        - name: Origin
          value: ""
          description: Request origin. Must match a trusted origin configured by the server.
        - name: Referer
          value: ""
          description: Request referer. Must belong to a trusted origin.
      body:
        type: json
        data: |-
          {
            "newPassword": "",
            "token": ""
          }
    response:
      status: 429
      statusText: Too Many Requests
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "INVALID_REQUEST_BODY",
            "message": "Invalid request body"
          }

docs: |
  Resets the password using a valid reset token.
  This state-changing endpoint requires trusted `Origin` and `Referer` headers.
