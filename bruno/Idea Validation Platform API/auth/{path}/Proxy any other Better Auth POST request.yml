info:
  name: Proxy any other Better Auth POST request
  type: http
  seq: 2
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/auth/:path"
  params:
    - name: path
      value: ""
      type: path
      description: |
        Generic Better Auth proxy path handled by `server/api/auth/[...all].ts`.
        For nested segments, provide URL-encoded slashes (`%2F`) in this parameter.
  body:
    type: json
    data: "{}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Proxied response
    request:
      url: "{{baseUrl}}/auth/:path"
      method: POST
      params:
        - name: path
          value: ""
          type: path
          description: |
            Generic Better Auth proxy path handled by `server/api/auth/[...all].ts`.
            For nested segments, provide URL-encoded slashes (`%2F`) in this parameter.
      body:
        type: json
        data: "{}"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 400 Response
    description: Invalid auth request
    request:
      url: "{{baseUrl}}/auth/:path"
      method: POST
      params:
        - name: path
          value: ""
          type: path
          description: |
            Generic Better Auth proxy path handled by `server/api/auth/[...all].ts`.
            For nested segments, provide URL-encoded slashes (`%2F`) in this parameter.
      body:
        type: json
        data: "{}"
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/auth/:path"
      method: POST
      params:
        - name: path
          value: ""
          type: path
          description: |
            Generic Better Auth proxy path handled by `server/api/auth/[...all].ts`.
            For nested segments, provide URL-encoded slashes (`%2F`) in this parameter.
      body:
        type: json
        data: "{}"
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 429 Response
    description: Too many requests
    request:
      url: "{{baseUrl}}/auth/:path"
      method: POST
      params:
        - name: path
          value: ""
          type: path
          description: |
            Generic Better Auth proxy path handled by `server/api/auth/[...all].ts`.
            For nested segments, provide URL-encoded slashes (`%2F`) in this parameter.
      body:
        type: json
        data: "{}"
    response:
      status: 429
      statusText: Too Many Requests
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
