info:
  name: Change password for the current authenticated user
  type: http
  seq: 1
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/auth/change-password"
  headers:
    - name: better-auth.session_token
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
        "currentPassword": "",
        "newPassword": "",
        "revokeOtherSessions": false
      }
  auth:
    type: apikey
    key: better-auth.session_token
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Password change succeeded
    request:
      url: "{{baseUrl}}/auth/change-password"
      method: POST
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      body:
        type: json
        data: |-
          {
            "currentPassword": "",
            "newPassword": "",
            "revokeOtherSessions": false
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": true,
            "message": "Request accepted"
          }
  - name: 400 Response
    description: Invalid request body or current password
    request:
      url: "{{baseUrl}}/auth/change-password"
      method: POST
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      body:
        type: json
        data: |-
          {
            "currentPassword": "",
            "newPassword": "",
            "revokeOtherSessions": false
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "INVALID_REQUEST_BODY",
            "message": "Invalid request body"
          }
  - name: 401 Response
    description: Missing or invalid session
    request:
      url: "{{baseUrl}}/auth/change-password"
      method: POST
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      body:
        type: json
        data: |-
          {
            "currentPassword": "",
            "newPassword": "",
            "revokeOtherSessions": false
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "INVALID_REQUEST_BODY",
            "message": "Invalid request body"
          }
  - name: 429 Response
    description: Too many requests
    request:
      url: "{{baseUrl}}/auth/change-password"
      method: POST
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      body:
        type: json
        data: |-
          {
            "currentPassword": "",
            "newPassword": "",
            "revokeOtherSessions": false
          }
    response:
      status: 429
      statusText: Too Many Requests
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": "INVALID_REQUEST_BODY",
            "message": "Invalid request body"
          }
