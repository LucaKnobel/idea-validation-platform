info:
  name: Get the measurement for a hypothesis
  type: http
  seq: 1
  tags:
    - Measurements

http:
  method: GET
  url: "{{baseUrl}}/hypotheses/:hypothesisId/measurement"
  headers:
    - name: better-auth.session_token
      value: "{{apiKey}}"
  params:
    - name: hypothesisId
      value: ""
      type: path
      description: Hypothesis identifier.
  auth:
    type: apikey
    key: better-auth.session_token
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Measurement loaded successfully
    request:
      url: "{{baseUrl}}/hypotheses/:hypothesisId/measurement"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: hypothesisId
          value: ""
          type: path
          description: Hypothesis identifier.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "value": 0,
            "note": "",
            "createdAt": "",
            "updatedAt": ""
          }
  - name: 400 Response
    description: Invalid path parameter
    request:
      url: "{{baseUrl}}/hypotheses/:hypothesisId/measurement"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: hypothesisId
          value: ""
          type: path
          description: Hypothesis identifier.
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 401 Response
    description: Missing or invalid session
    request:
      url: "{{baseUrl}}/hypotheses/:hypothesisId/measurement"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: hypothesisId
          value: ""
          type: path
          description: Hypothesis identifier.
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 404 Response
    description: Measurement not found or not accessible
    request:
      url: "{{baseUrl}}/hypotheses/:hypothesisId/measurement"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: hypothesisId
          value: ""
          type: path
          description: Hypothesis identifier.
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 429 Response
    description: Too many requests
    request:
      url: "{{baseUrl}}/hypotheses/:hypothesisId/measurement"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: hypothesisId
          value: ""
          type: path
          description: Hypothesis identifier.
    response:
      status: 429
      statusText: Too Many Requests
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }

docs: |
  Returns the measurement singleton for a specific hypothesis owned by the current authenticated user.
