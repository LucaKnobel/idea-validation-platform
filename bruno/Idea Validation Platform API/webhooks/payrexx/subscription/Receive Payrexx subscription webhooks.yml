info:
  name: Receive Payrexx subscription webhooks
  type: http
  seq: 1
  tags:
    - Webhooks

http:
  method: POST
  url: "{{baseUrl}}/webhooks/payrexx/subscription"
  body:
    type: json
    data: "{}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Webhook processed successfully
    request:
      url: "{{baseUrl}}/webhooks/payrexx/subscription"
      method: POST
      body:
        type: json
        data: "{}"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "ok": true
          }
  - name: 400 Response
    description: Invalid webhook payload or missing checkout reference
    request:
      url: "{{baseUrl}}/webhooks/payrexx/subscription"
      method: POST
      body:
        type: json
        data: "{}"
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 401 Response
    description: Invalid webhook signature
    request:
      url: "{{baseUrl}}/webhooks/payrexx/subscription"
      method: POST
      body:
        type: json
        data: "{}"
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 429 Response
    description: Too many requests
    request:
      url: "{{baseUrl}}/webhooks/payrexx/subscription"
      method: POST
      body:
        type: json
        data: "{}"
    response:
      status: 429
      statusText: Too Many Requests
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }

docs: |
  Webhook endpoint for Payrexx subscription lifecycle events.
  Verifies webhook signature, resolves user from checkout ID, and syncs subscription state.
  Returns 200 OK for processed or already-handled webhooks (idempotent).
  Rate limited per IP address.
