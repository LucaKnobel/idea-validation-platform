info:
  name: Get localized content by slug
  type: http
  seq: 1
  tags:
    - Content

http:
  method: GET
  url: "{{baseUrl}}/content/:slug"
  params:
    - name: slug
      value: ""
      type: path
      description: Content slug path, for example `legal/privacy`.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Content found
    request:
      url: "{{baseUrl}}/content/:slug"
      method: GET
      params:
        - name: slug
          value: ""
          type: path
          description: Content slug path, for example `legal/privacy`.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "path": "",
            "title": "",
            "description": "",
            "locale": "en"
          }
  - name: 404 Response
    description: Content not found
    request:
      url: "{{baseUrl}}/content/:slug"
      method: GET
      params:
        - name: slug
          value: ""
          type: path
          description: Content slug path, for example `legal/privacy`.
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 429 Response
    description: Too many requests
    request:
      url: "{{baseUrl}}/content/:slug"
      method: GET
      params:
        - name: slug
          value: ""
          type: path
          description: Content slug path, for example `legal/privacy`.
    response:
      status: 429
      statusText: Too Many Requests
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }

docs: |
  Returns content for the requested slug.
  Locale resolution is cookie-based (`i18n_redirected`) with fallback to `en`.
  If localized content is missing, the endpoint falls back to English content.
