info:
  name: Get content by path
  type: http
  seq: 1
  tags:
    - Content

http:
  method: GET
  url: "{{baseUrl}}/content/:contentPath"
  params:
    - name: contentPath
      value: legal/privacy
      type: path
      description: Full content path (e.g. legal/privacy)
    - name: locale
      value: en
      type: query
      description: Language of the content
    - name: locale
      value: de
      type: query
      description: Language of the content
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Content found
    request:
      url: "{{baseUrl}}/content/:contentPath"
      method: GET
      params:
        - name: contentPath
          value: ""
          type: path
          description: Full content path (e.g. legal/privacy)
        - name: locale
          value: en
          type: query
          description: Language of the content
        - name: locale
          value: de
          type: query
          description: Language of the content
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "title": "",
            "path": "",
            "locale": "en",
            "description": ""
          }
  - name: 400 Response
    description: Invalid request
    request:
      url: "{{baseUrl}}/content/:contentPath"
      method: GET
      params:
        - name: contentPath
          value: ""
          type: path
          description: Full content path (e.g. legal/privacy)
        - name: locale
          value: en
          type: query
          description: Language of the content
        - name: locale
          value: de
          type: query
          description: Language of the content
          disabled: true
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Content not found
    request:
      url: "{{baseUrl}}/content/:contentPath"
      method: GET
      params:
        - name: contentPath
          value: ""
          type: path
          description: Full content path (e.g. legal/privacy)
        - name: locale
          value: en
          type: query
          description: Language of the content
        - name: locale
          value: de
          type: query
          description: Language of the content
          disabled: true
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""

docs: |
  Returns localized content by path.
  Falls back to English if not found.
