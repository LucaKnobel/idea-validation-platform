info:
  name: Get one idea with full version metadata
  type: http
  seq: 1
  tags:
    - Ideas

http:
  method: GET
  url: "{{baseUrl}}/ideas/:id"
  headers:
    - name: better-auth.session_token
      value: "{{apiKey}}"
  params:
    - name: id
      value: ""
      type: path
      description: Idea identifier.
  auth:
    type: apikey
    key: better-auth.session_token
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Idea loaded successfully
    request:
      url: "{{baseUrl}}/ideas/:id"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
          description: Idea identifier.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "latestVersionId": "",
            "latestVersionNumber": 0,
            "versions": [
              {
                "id": "",
                "versionNumber": 0,
                "type": "INITIAL",
                "parentVersionId": "",
                "parentVersionNumber": 0,
                "title": "",
                "description": "",
                "createdAt": "",
                "updatedAt": ""
              }
            ],
            "createdAt": "",
            "updatedAt": ""
          }
  - name: 400 Response
    description: Invalid path parameter
    request:
      url: "{{baseUrl}}/ideas/:id"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
          description: Idea identifier.
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 401 Response
    description: Missing or invalid session
    request:
      url: "{{baseUrl}}/ideas/:id"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
          description: Idea identifier.
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 404 Response
    description: Idea not found or not accessible
    request:
      url: "{{baseUrl}}/ideas/:id"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
          description: Idea identifier.
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 429 Response
    description: Too many requests
    request:
      url: "{{baseUrl}}/ideas/:id"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
          description: Idea identifier.
    response:
      status: 429
      statusText: Too Many Requests
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }

docs: |
  Returns one idea owned by the current authenticated user.
  The payload includes the latest version pointer and metadata for all idea versions.
