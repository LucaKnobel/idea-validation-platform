  - name: 429 Response
    description: Too many requests
    request:
      url: "{{baseUrl}}/ideas/:id/versions"
      method: POST
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
          description: Idea identifier.
      body:
        type: json
        data: |-
          {
            "baseVersionId": "",
            "type": "ITERATION"
          }
    response:
      status: 429
      statusText: Too Many Requests
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
