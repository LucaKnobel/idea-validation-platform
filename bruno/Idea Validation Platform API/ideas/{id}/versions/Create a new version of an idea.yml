info:
  name: Create a new version of an idea
  type: http
  seq: 2
  tags:
    - Idea Versions

http:
  method: POST
  url: "{{baseUrl}}/ideas/:id/versions"
  headers:
    - name: better-auth.session_token
      value: "{{apiKey}}"
  params:
    - name: id
      value: ""
      type: path
      description: Idea identifier.
  body:
    type: json
    data: |-
      {
        "baseVersionId": "",
        "type": "ITERATION"
      }
  auth:
    type: apikey
    key: better-auth.session_token
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Version created successfully
    request:
      url: "{{baseUrl}}/ideas/:id/versions"
      method: POST
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
          description: Idea identifier.
      body:
        type: json
        data: |-
          {
            "baseVersionId": "",
            "type": "ITERATION"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "versionNumber": 0,
            "type": "INITIAL",
            "parentVersionId": "",
            "parentVersionNumber": 0,
            "title": "",
            "description": "",
            "createdAt": "",
            "updatedAt": ""
          }
  - name: 400 Response
    description: Invalid path parameter or request body
    request:
      url: "{{baseUrl}}/ideas/:id/versions"
      method: POST
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
          description: Idea identifier.
      body:
        type: json
        data: |-
          {
            "baseVersionId": "",
            "type": "ITERATION"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 401 Response
    description: Missing or invalid session
    request:
      url: "{{baseUrl}}/ideas/:id/versions"
      method: POST
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
          description: Idea identifier.
      body:
        type: json
        data: |-
          {
            "baseVersionId": "",
            "type": "ITERATION"
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 404 Response
    description: Idea or base version not found
    request:
      url: "{{baseUrl}}/ideas/:id/versions"
      method: POST
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
          description: Idea identifier.
      body:
        type: json
        data: |-
          {
            "baseVersionId": "",
            "type": "ITERATION"
          }
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
