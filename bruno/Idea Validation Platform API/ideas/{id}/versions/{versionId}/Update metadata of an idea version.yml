info:
  name: Update metadata of an idea version
  type: http
  seq: 1
  tags:
    - Idea Versions

http:
  method: PUT
  url: "{{baseUrl}}/ideas/:id/versions/:versionId"
  headers:
    - name: better-auth.session_token
      value: "{{apiKey}}"
  params:
    - name: id
      value: ""
      type: path
      description: Idea identifier.
    - name: versionId
      value: ""
      type: path
      description: Idea version identifier.
  body:
    type: json
    data: |-
      {
        "title": "",
        "description": ""
      }
  auth:
    type: apikey
    key: better-auth.session_token
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Version metadata updated successfully
