info:
  name: Replace the entire canvas for an idea version
  type: http
  seq: 2
  tags:
    - Idea Versions

http:
  method: PUT
  url: "{{baseUrl}}/ideas/:id/versions/:versionId/canvas"
  headers:
    - name: better-auth.session_token
      value: "{{apiKey}}"
  params:
    - name: id
      value: ""
      type: path
      description: Idea identifier.
    - name: versionId
      value: ""
      type: path
      description: Idea version identifier.
  body:
    type: json
    data: |-
      {
        "elements": [
          {
            "type": "CUSTOMER_SEGMENTS",
            "content": ""
          }
        ]
      }
  auth:
    type: apikey
    key: better-auth.session_token
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

