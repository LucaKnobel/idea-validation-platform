info:
  name: List hypotheses for an idea version
  type: http
  seq: 1
  tags:
    - Hypotheses

http:
  method: GET
  url: "{{baseUrl}}/ideas/:id/versions/:versionId/hypotheses"
  headers:
    - name: better-auth.session_token
      value: "{{apiKey}}"
  params:
    - name: id
      value: ""
      type: path
      description: Idea identifier.
    - name: versionId
      value: ""
      type: path
      description: Idea version identifier.
  auth:
    type: apikey
    key: better-auth.session_token
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Hypotheses loaded successfully
    request:
      url: "{{baseUrl}}/ideas/:id/versions/:versionId/hypotheses"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
          description: Idea identifier.
        - name: versionId
          value: ""
          type: path
          description: Idea version identifier.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "items": [
              {
                "id": "",
                "ideaVersionId": "",
                "statement": "",
                "dimension": "PROBLEM",
                "priority": "HIGH",
                "evidenceType": "QUALITATIVE",
                "status": "NOT_TESTED",
                "canvasSections": [
                  "CUSTOMER_SEGMENTS"
                ],
                "createdAt": "",
                "updatedAt": ""
              }
            ]
          }
  - name: 400 Response
    description: Invalid path parameter
    request:
      url: "{{baseUrl}}/ideas/:id/versions/:versionId/hypotheses"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
          description: Idea identifier.
        - name: versionId
          value: ""
          type: path
          description: Idea version identifier.
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 401 Response
    description: Missing or invalid session
    request:
      url: "{{baseUrl}}/ideas/:id/versions/:versionId/hypotheses"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
          description: Idea identifier.
        - name: versionId
          value: ""
          type: path
          description: Idea version identifier.
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 404 Response
    description: Idea version not found or not accessible
    request:
      url: "{{baseUrl}}/ideas/:id/versions/:versionId/hypotheses"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
          description: Idea identifier.
        - name: versionId
          value: ""
          type: path
          description: Idea version identifier.
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 429 Response
    description: Too many requests
    request:
      url: "{{baseUrl}}/ideas/:id/versions/:versionId/hypotheses"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
          description: Idea identifier.
        - name: versionId
          value: ""
          type: path
          description: Idea version identifier.
    response:
      status: 429
      statusText: Too Many Requests
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }

docs: |
  Returns all hypotheses for one specific idea version owned by the current authenticated user.
  Access is restricted by both authentication and ownership.
