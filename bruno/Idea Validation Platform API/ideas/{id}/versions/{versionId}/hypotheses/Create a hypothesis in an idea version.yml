info:
  name: Create a hypothesis in an idea version
  type: http
  seq: 2
  tags:
    - Hypotheses

http:
  method: POST
  url: "{{baseUrl}}/ideas/:id/versions/:versionId/hypotheses"
  headers:
    - name: better-auth.session_token
      value: "{{apiKey}}"
  params:
    - name: id
      value: ""
      type: path
      description: Idea identifier.
    - name: versionId
      value: ""
      type: path
      description: Idea version identifier.
  body:
    type: json
    data: |-
      {
        "statement": "",
        "dimension": "PROBLEM",
        "priority": "HIGH",
        "evidenceType": "QUALITATIVE",
        "canvasElementTypes": [
          "CUSTOMER_SEGMENTS"
        ]
      }
  auth:
    type: apikey
    key: better-auth.session_token
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

