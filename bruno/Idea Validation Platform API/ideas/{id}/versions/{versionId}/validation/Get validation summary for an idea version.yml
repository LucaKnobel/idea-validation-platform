info:
  name: Get validation summary for an idea version
  type: http
  seq: 1
  tags:
    - Idea Versions

http:
  method: GET
  url: "{{baseUrl}}/ideas/:id/versions/:versionId/validation"
  headers:
    - name: better-auth.session_token
      value: "{{apiKey}}"
  params:
    - name: id
      value: ""
      type: path
      description: Idea identifier.
    - name: versionId
      value: ""
      type: path
      description: Idea version identifier.
  auth:
    type: apikey
    key: better-auth.session_token
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Validation summary loaded successfully
    request:
      url: "{{baseUrl}}/ideas/:id/versions/:versionId/validation"
      method: GET
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      params:
        - name: id
          value: ""
          type: path
          description: Idea identifier.
        - name: versionId
          value: ""
          type: path
          description: Idea version identifier.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "ideaId": "",
            "ideaVersionId": "",
            "totalHypotheses": 0,
            "statusCounts": {
              "validated": 0,
              "invalidated": 0,
              "notTested": 0
            },
            "priorityCounts": {
              "high": 0,
              "medium": 0,
              "low": 0
            },
            "evidenceCounts": {
              "qualitative": 0,
              "quantitative": 0,
              "behavioral": 0,
              "monetary": 0
            },
            "dimensionCards": [
              {
                "dimension": "PROBLEM",
                "statusCounts": {
                  "validated": 0,
                  "invalidated": 0,
                  "notTested": 0
                },
                "priorityCounts": {
                  "high": 0,
                  "medium": 0,
                  "low": 0
                },
                "evidenceCounts": {
                  "qualitative": 0,
                  "quantitative": 0,
                  "behavioral": 0,
                  "monetary": 0
                }
              }
            ]
          }
