info:
  name: Create a new idea
  type: http
  seq: 2
  tags:
    - Ideas

http:
  method: POST
  url: "{{baseUrl}}/ideas"
  headers:
    - name: better-auth.session_token
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
        "title": "",
        "description": ""
      }
  auth:
    type: apikey
    key: better-auth.session_token
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Idea created
    request:
      url: "{{baseUrl}}/ideas"
      method: POST
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      body:
        type: json
        data: |-
          {
            "title": "",
            "description": ""
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "latestVersionId": "",
            "title": "",
            "description": "",
            "createdAt": "",
            "updatedAt": ""
          }
  - name: 400 Response
    description: Invalid request body
    request:
      url: "{{baseUrl}}/ideas"
      method: POST
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      body:
        type: json
        data: |-
          {
            "title": "",
            "description": ""
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 401 Response
    description: Missing or invalid session
    request:
      url: "{{baseUrl}}/ideas"
      method: POST
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      body:
        type: json
        data: |-
          {
            "title": "",
            "description": ""
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 403 Response
    description: Subscription limit exceeded
    request:
      url: "{{baseUrl}}/ideas"
      method: POST
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      body:
        type: json
        data: |-
          {
            "title": "",
            "description": ""
          }
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }
  - name: 429 Response
    description: Too many requests
    request:
      url: "{{baseUrl}}/ideas"
      method: POST
      headers:
        - name: better-auth.session_token
          value: "{{apiKey}}"
      body:
        type: json
        data: |-
          {
            "title": "",
            "description": ""
          }
    response:
      status: 429
      statusText: Too Many Requests
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 0,
            "statusMessage": "",
            "message": ""
          }

docs: |
  Creates a new idea for the current authenticated user.
  Free plan users are limited to one idea.
