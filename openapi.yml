openapi: '3.0.3'
info:
  title: Idea Validation Platform API
  version: '1.0'
  description: API specification for Idea Validation Platform API

servers:
  - url: http://localhost:3000/api

tags:
  - name: Content
    description: Read-only localized content endpoints
  - name: Auth
    description: Authentication and session management endpoints
  - name: Ideas
    description: Authenticated idea management endpoints

security: []

paths:
  /content/{slug}:
    get:
      operationId: getContent
      summary: Get localized content by slug
      description: |
        Returns content for the requested slug.
        Locale resolution is cookie-based (`i18n_redirected`) with fallback to `en`.
        If localized content is missing, the endpoint falls back to English content.
      tags:
        - Content
      parameters:
        - name: slug
          in: path
          required: true
          description: Content slug path, for example `legal/privacy`.
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Content found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentDocument'
        '404':
          description: Content not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ideas:
    get:
      operationId: listIdeas
      summary: List ideas of the authenticated user
      description: |
        Returns a paginated list of ideas owned by the current authenticated user.
        Supports optional full-text query over title and description.
      tags:
        - Ideas
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          description: Number of items per page.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: q
          in: query
          required: false
          description: Optional search query (trimmed by server).
          schema:
            type: string
            maxLength: 200
      responses:
        '200':
          description: Ideas loaded successfully
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdeasListResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      operationId: createIdea
      summary: Create a new idea
      description: |
        Creates a new idea for the current authenticated user.
        Free plan users are limited to one idea.
      tags:
        - Ideas
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIdeaRequest'
      responses:
        '200':
          description: Idea created
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdeaResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Subscription limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ideas/{id}:
    delete:
      operationId: deleteIdea
      summary: Delete an existing idea
      description: |
        Deletes one idea owned by the current authenticated user.
        Returns `404` when the idea does not exist for this user.
      tags:
        - Ideas
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Idea identifier.
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Idea deleted successfully
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 0
        '400':
          description: Invalid path parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Idea not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/sign-up/email:
    post:
      operationId: signUpWithEmail
      summary: Register a new account
      description: |
        Creates a new account and triggers verification flow.
        This state-changing endpoint requires trusted `Origin` and `Referer` headers.
      tags:
        - Auth
      parameters:
        - $ref: '#/components/parameters/OriginHeader'
        - $ref: '#/components/parameters/RefererHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '200':
          description: Sign-up accepted (neutral success response)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
        '400':
          description: Invalid request body or missing/untrusted origin context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/sign-in/email:
    post:
      operationId: signInWithEmail
      summary: Sign in with email and password
      description: |
        Authenticates a user and issues a session cookie when successful.
        This state-changing endpoint requires trusted `Origin` and `Referer` headers.
      tags:
        - Auth
      parameters:
        - $ref: '#/components/parameters/OriginHeader'
        - $ref: '#/components/parameters/RefererHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Sign-in succeeded and session cookie is issued
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Contains `better-auth.session_token`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Email not verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/sign-out:
    post:
      operationId: signOut
      summary: Sign out current session
      description: |
        Invalidates the current session.
        This state-changing endpoint requires trusted `Origin` and `Referer` headers.
      tags:
        - Auth
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OriginHeader'
        - $ref: '#/components/parameters/RefererHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example: {}
      responses:
        '200':
          description: Sign-out succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
        '400':
          description: Missing or untrusted origin context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '401':
          description: No active session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/get-session:
    get:
      operationId: getSession
      summary: Get current session and user
      tags:
        - Auth
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Session payload returned (or null fields when no active session)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionEnvelope'
        '401':
          description: Invalid or missing session cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/send-verification-email:
    post:
      operationId: sendVerificationEmail
      summary: Send (or re-send) verification email
      description: |
        Sends (or re-sends) the verification email.
        This state-changing endpoint requires trusted `Origin` and `Referer` headers.
      tags:
        - Auth
      parameters:
        - $ref: '#/components/parameters/OriginHeader'
        - $ref: '#/components/parameters/RefererHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendVerificationEmailRequest'
      responses:
        '200':
          description: Request accepted (neutral success response)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
        '400':
          description: Invalid request body or missing/untrusted origin context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/verify-email:
    get:
      operationId: verifyEmail
      summary: Verify email using token
      tags:
        - Auth
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: callbackURL
          in: query
          required: false
          schema:
            type: string
            minLength: 1
          description: Relative callback path after successful verification.
      responses:
        '200':
          description: Email verification processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
        '400':
          description: Invalid or expired verification token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/request-password-reset:
    post:
      operationId: requestPasswordReset
      summary: Request a password reset email
      description: |
        Requests a password reset email.
        This state-changing endpoint requires trusted `Origin` and `Referer` headers.
      tags:
        - Auth
      parameters:
        - $ref: '#/components/parameters/OriginHeader'
        - $ref: '#/components/parameters/RefererHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPasswordResetRequest'
      responses:
        '200':
          description: Request accepted (generic response to prevent account enumeration)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
        '400':
          description: Invalid request body or missing/untrusted origin context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/reset-password:
    post:
      operationId: resetPassword
      summary: Reset password with token
      description: |
        Resets the password using a valid reset token.
        This state-changing endpoint requires trusted `Origin` and `Referer` headers.
      tags:
        - Auth
      parameters:
        - $ref: '#/components/parameters/OriginHeader'
        - $ref: '#/components/parameters/RefererHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
        '400':
          description: Invalid request body, token, or missing/untrusted origin context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

components:
  parameters:
    OriginHeader:
      name: Origin
      in: header
      required: true
      description: Request origin. Must match a trusted origin configured by the server.
      schema:
        type: string
        format: uri

    RefererHeader:
      name: Referer
      in: header
      required: true
      description: Request referer. Must belong to a trusted origin.
      schema:
        type: string
        format: uri

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token

  schemas:
    Locale:
      type: string
      enum: [en, de]

    ContentDocument:
      type: object
      description: Content document returned by Nuxt Content.
      properties:
        id:
          type: string
        path:
          type: string
        title:
          type: string
        description:
          type: string
        locale:
          $ref: '#/components/schemas/Locale'
      additionalProperties: true

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        statusMessage:
          type: string
        message:
          type: string
      additionalProperties: true

    AuthErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: INVALID_REQUEST_BODY
        message:
          type: string
          example: Invalid request body
      additionalProperties: true

    AuthStatusResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: Request accepted
      additionalProperties: true

    SessionEnvelope:
      type: object
      description: Session payload returned by Better Auth.
      properties:
        session:
          type: object
          nullable: true
          additionalProperties: true
        user:
          type: object
          nullable: true
          additionalProperties: true
      additionalProperties: true

    CreateIdeaRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Idea title. Leading/trailing whitespace is trimmed.
        description:
          type: string
          maxLength: 3000
          description: Optional idea description. Blank values are normalized to null.

    IdeaResponse:
      type: object
      required:
        - id
        - title
        - description
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    IdeasListResponse:
      type: object
      required:
        - items
        - page
        - pageSize
        - total
        - totalPages
        - q
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/IdeaResponse'
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
        q:
          type: string
          nullable: true
          description: Normalized (trimmed) query string used for filtering.

    SignUpRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 15
          maxLength: 256
          description: Must include uppercase, lowercase, number, and special character.
        name:
          type: string
          description: Optional display name.
        callbackURL:
          type: string
          description: Relative path callback (for example `/auth/login`).
          pattern: '^/(?!/).*'

    SignInRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
          maxLength: 256
        rememberMe:
          type: boolean
          default: true
        callbackURL:
          type: string
          description: Relative path callback.
          pattern: '^/(?!/).*'

    SendVerificationEmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        callbackURL:
          type: string
          description: Relative path callback.
          pattern: '^/(?!/).*'

    RequestPasswordResetRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        redirectTo:
          type: string
          format: uri
          description: Absolute URL used in reset email.

    ResetPasswordRequest:
      type: object
      required:
        - newPassword
        - token
      properties:
        newPassword:
          type: string
          minLength: 15
          maxLength: 256
          description: Must include uppercase, lowercase, number, and special character.
        token:
          type: string
          minLength: 1
          maxLength: 512