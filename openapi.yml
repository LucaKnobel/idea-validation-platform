        '500':
          description: Provider subscription ID missing or internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Failed to cancel subscription at Payrexx
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /webhooks/payrexx/subscription:
    post:
      operationId: payrexxSubscriptionWebhook
      summary: Receive Payrexx subscription webhooks
      description: |
        Webhook endpoint for Payrexx subscription lifecycle events.
        Verifies webhook signature, resolves user from checkout ID, and syncs subscription state.
        Returns 200 OK for processed or already-handled webhooks (idempotent).
        Rate limited per IP address.
      tags:
        - Webhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Payrexx webhook payload
      responses:
        '200':
          description: Webhook processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '400':
          description: Invalid webhook payload or missing checkout reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid webhook signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/sign-up/email:
    post:
      operationId: authSignUpEmail
      summary: Register with email and password
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '200':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/sign-in/email:
    post:
      operationId: authSignInEmail
      summary: Sign in with email and password
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Sign-in succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/sign-out:
    post:
      operationId: authSignOut
      summary: Sign out current session
      tags:
        - Auth
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Sign-out succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
        '401':
          description: No active session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/get-session:
    get:
      operationId: authGetSession
      summary: Get current session and user
      tags:
        - Auth
      responses:
        '200':
          description: Session payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionEnvelope'
        '401':
          description: Invalid or missing session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/send-verification-email:
    post:
      operationId: authSendVerificationEmail
      summary: Send or resend verification email
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendVerificationEmailRequest'
      responses:
        '200':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/verify-email:
    get:
      operationId: authVerifyEmail
      summary: Verify email token
      tags:
        - Auth
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 512
        - name: callbackURL
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 2048
            pattern: '^/(?!/).*'
      responses:
        '200':
          description: Verification processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
        '400':
          description: Invalid token or request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/request-password-reset:
    post:
      operationId: authRequestPasswordReset
      summary: Request password reset email
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPasswordResetRequest'
      responses:
        '200':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/reset-password:
    post:
      operationId: authResetPassword
      summary: Reset password with token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
        '400':
          description: Invalid request body or token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/change-password:
    post:
      operationId: authChangePassword
      summary: Change password for the current authenticated user
      tags:
        - Auth
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password change succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
        '400':
          description: Invalid request body or current password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '401':
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/{path}:
    parameters:
      - name: path
        in: path
        required: true
        description: |
          Generic Better Auth proxy path handled by `server/api/auth/[...all].ts`.
          For nested segments, provide URL-encoded slashes (`%2F`) in this parameter.
        schema:
          type: string
    get:
      operationId: authProxyGet
      summary: Proxy any other Better Auth GET request
      tags:
        - Auth
      responses:
        '200':
          description: Proxied response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Invalid auth request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      operationId: authProxyPost
      summary: Proxy any other Better Auth POST request
      tags:
        - Auth
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Proxied response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Invalid auth request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token

  schemas:
    Locale:
      type: string
      enum: [en, de]

    ContentDocument:
      type: object
      description: Content document returned by Nuxt Content.
      properties:
        id:
          type: string
        path:
          type: string
        title:
          type: string
        description:
          type: string
        locale:
          $ref: '#/components/schemas/Locale'
      additionalProperties: true

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        statusMessage:
          type: string
        message:
          type: string
      additionalProperties: true

    AuthErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: INVALID_REQUEST_BODY
        message:
          type: string
          example: Invalid request body
      additionalProperties: true

    AuthStatusResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: Request accepted
      additionalProperties: true

    SessionEnvelope:
      type: object
      description: Session payload returned by Better Auth.
      properties:
        session:
          type: object
          nullable: true
          additionalProperties: true
        user:
          type: object
          nullable: true
          additionalProperties: true
      additionalProperties: true

    CreateIdeaRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Idea title. Leading/trailing whitespace is trimmed.
        description:
          type: string
          maxLength: 3000
          description: Optional idea description. Blank values are normalized to null.

    IdeaResponse:
      type: object
      required:
        - id
        - latestVersionId
        - title
        - description
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        latestVersionId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    IdeaDetailResponse:
      type: object
      required:
        - id
        - latestVersionId
        - latestVersionNumber
        - versions
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        latestVersionId:
          type: string
          format: uuid
        latestVersionNumber:
          type: integer
          minimum: 1
        versions:
          type: array
          items:
            $ref: '#/components/schemas/IdeaVersionMetadata'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    IdeasListResponse:
      type: object
      required:
        - items
        - page
        - pageSize
        - total
        - totalPages
        - q
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/IdeaResponse'
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
        q:
          type: string
          nullable: true
          description: Normalized (trimmed) query string used for filtering.

    CanvasElementInput:
      type: object
      required:
        - type
        - content
      properties:
        type:
          $ref: '#/components/schemas/CanvasElementType'
        content:
          type: string
          minLength: 1
          maxLength: 5000
          description: Canvas content trimmed by the server.

    ReplaceIdeaVersionCanvasRequest:
      type: object
      required:
        - elements
      properties:
        elements:
          type: array
          minItems: 0
          maxItems: 500
          items:
            $ref: '#/components/schemas/CanvasElementInput'

    CanvasElementResponse:
      type: object
      required:
        - id
        - ideaVersionId
        - type
        - content
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        ideaVersionId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/CanvasElementType'
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    IdeaVersionCanvasResponse:
      type: object
      required:
        - elements
      properties:
        elements:
          type: array
          items:
            $ref: '#/components/schemas/CanvasElementResponse'

    HypothesisResponse:
      type: object
      required:
        - id
        - ideaVersionId
        - statement
        - dimension
        - priority
        - evidenceType
        - status
        - canvasSections
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        ideaVersionId:
          type: string
          format: uuid
        statement:
          type: string
        dimension:
          $ref: '#/components/schemas/HypothesisDimension'
        priority:
          $ref: '#/components/schemas/HypothesisPriority'
        evidenceType:
          $ref: '#/components/schemas/HypothesisEvidenceType'
        status:
          $ref: '#/components/schemas/HypothesisStatus'
        canvasSections:
          type: array
          items:
            $ref: '#/components/schemas/CanvasElementType'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    HypothesesListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/HypothesisResponse'

    ValidationStatusCounts:
      type: object
      required:
        - validated
        - invalidated
        - notTested
      properties:
        validated:
          type: integer
          minimum: 0
        invalidated:
          type: integer
          minimum: 0
        notTested:
          type: integer
          minimum: 0

    ValidationPriorityCounts:
      type: object
      required:
        - high
        - medium
        - low
      properties:
        high:
          type: integer
          minimum: 0
        medium:
          type: integer
          minimum: 0
        low:
          type: integer
          minimum: 0

    ValidationEvidenceCounts:
      type: object
      required:
        - qualitative
        - quantitative
        - behavioral
        - monetary
      properties:
        qualitative:
          type: integer
          minimum: 0
        quantitative:
          type: integer
          minimum: 0
        behavioral:
          type: integer
          minimum: 0
        monetary:
          type: integer
          minimum: 0

    IdeaVersionValidationOverviewDimensionCard:
      type: object
      required:
        - dimension
        - statusCounts
        - priorityCounts
        - evidenceCounts
      properties:
        dimension:
          $ref: '#/components/schemas/HypothesisDimension'
        statusCounts:
          $ref: '#/components/schemas/ValidationStatusCounts'
        priorityCounts:
          $ref: '#/components/schemas/ValidationPriorityCounts'
        evidenceCounts:
          $ref: '#/components/schemas/ValidationEvidenceCounts'

    IdeaVersionValidationOverviewResponse:
      type: object
      required:
        - ideaId
        - ideaVersionId
        - totalHypotheses
        - statusCounts
        - priorityCounts
        - evidenceCounts
        - dimensionCards
      properties:
        ideaId:
          type: string
          format: uuid
        ideaVersionId:
          type: string
          format: uuid
        totalHypotheses:
          type: integer
          minimum: 0
        statusCounts:
          $ref: '#/components/schemas/ValidationStatusCounts'
        priorityCounts:
          $ref: '#/components/schemas/ValidationPriorityCounts'
        evidenceCounts:
          $ref: '#/components/schemas/ValidationEvidenceCounts'
        dimensionCards:
          type: array
          items:
            $ref: '#/components/schemas/IdeaVersionValidationOverviewDimensionCard'

    CreateHypothesisRequest:
      type: object
      required:
        - statement
        - dimension
        - priority
        - evidenceType
        - canvasElementTypes
      properties:
        statement:
          type: string
          minLength: 1
          maxLength: 3000
          description: Hypothesis statement trimmed by the server.
        dimension:
          $ref: '#/components/schemas/HypothesisDimension'
        priority:
          $ref: '#/components/schemas/HypothesisPriority'
        evidenceType:
          $ref: '#/components/schemas/HypothesisEvidenceType'
        canvasElementTypes:
          type: array
          minItems: 1
          maxItems: 9
          items:
            $ref: '#/components/schemas/CanvasElementType'

    UpdateHypothesisRequest:
      allOf:
        - $ref: '#/components/schemas/CreateHypothesisRequest'

    UpsertExperimentRequest:
      type: object
      required:
        - title
        - description
        - status
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Experiment title trimmed by the server.
        description:
          type: string
          nullable: true
          maxLength: 4000
          description: Optional experiment description. Blank values are normalized to null.
        status:
          $ref: '#/components/schemas/ExperimentStatus'

    ExperimentResponse:
      type: object
      required:
        - id
        - title
        - description
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ExperimentStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UpsertMetricRequest:
      type: object
      required:
        - name
        - description
        - unit
        - threshold
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Metric name trimmed by the server.
        description:
          type: string
          nullable: true
          maxLength: 1000
          description: Optional metric description. Blank values are normalized to null.
        unit:
          type: string
          nullable: true
          maxLength: 100
          description: Optional metric unit. Blank values are normalized to null.
        threshold:
          $ref: '#/components/schemas/MetricThresholdInput'

    MetricThresholdInput:
      type: object
      required:
        - operator
        - referenceValue
      properties:
        operator:
          $ref: '#/components/schemas/ThresholdOperator'
        referenceValue:
          type: number

    MetricResponse:
      type: object
      required:
        - id
        - name
        - description
        - unit
        - threshold
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        unit:
          type: string
          nullable: true
        threshold:
          type: object
          allOf:
            - $ref: '#/components/schemas/MetricThresholdResponse'
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MetricThresholdResponse:
      type: object
      required:
        - operator
        - referenceValue
      properties:
        operator:
          $ref: '#/components/schemas/ThresholdOperator'
        referenceValue:
          type: number

    UpsertMeasurementRequest:
      type: object
      required:
        - value
        - note
      properties:
        value:
          type: number
        note:
          type: string
          nullable: true
          maxLength: 2000
          description: Optional measurement note. Blank values are normalized to null.

    MeasurementResponse:
      type: object
      required:
        - id
        - value
        - note
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        value:
          type: number
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CanvasElementType:
      type: string
      enum:
        - CUSTOMER_SEGMENTS
        - VALUE_PROPOSITIONS
        - CHANNELS
        - CUSTOMER_RELATIONSHIPS
        - REVENUE_STREAMS
        - KEY_RESOURCES
        - KEY_ACTIVITIES
        - KEY_PARTNERS
        - COST_STRUCTURE

    HypothesisDimension:
      type: string
      enum:
        - PROBLEM
        - SOLUTION
        - MARKET
        - MONETIZATION
        - EXECUTION

    HypothesisPriority:
      type: string
      enum:
        - HIGH
        - MEDIUM
        - LOW

    HypothesisEvidenceType:
      type: string
      enum:
        - QUALITATIVE
        - QUANTITATIVE
        - BEHAVIORAL
        - MONETARY

    HypothesisStatus:
      type: string
      enum:
        - NOT_TESTED
        - VALIDATED
        - INVALIDATED

    ExperimentStatus:
      type: string
      enum:
        - PLANNED
        - RUNNING
        - COMPLETED
        - CANCELLED

    ThresholdOperator:
      type: string
      enum:
        - GTE
        - GT
        - LTE
        - LT
        - EQ

    SignUpRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 15
          maxLength: 256
          description: Must include uppercase, lowercase, number, and special character.
        callbackURL:
          type: string
          minLength: 1
          maxLength: 2048
          description: Relative path callback (for example `/auth/login`).
          pattern: '^/(?!/).*'

    SignInRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
          maxLength: 256
        rememberMe:
          type: boolean
          default: true
        callbackURL:
          type: string
          minLength: 1
          maxLength: 2048
          description: Relative path callback.
          pattern: '^/(?!/).*'

    SendVerificationEmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        callbackURL:
          type: string
          minLength: 1
          maxLength: 2048
          description: Relative path callback.
          pattern: '^/(?!/).*'

    RequestPasswordResetRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        redirectTo:
          type: string
          format: uri
          maxLength: 2048
          description: Absolute URL used in reset email.
          pattern: '^https?://'

    ResetPasswordRequest:
      type: object
      required:
        - newPassword
        - token
      properties:
        newPassword:
          type: string
          minLength: 15
          maxLength: 256
          description: Must include uppercase, lowercase, number, and special character.
        token:
          type: string
          minLength: 1
          maxLength: 512

    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          minLength: 1
          maxLength: 256
          description: Current password of the authenticated user.
        newPassword:
          type: string
          minLength: 15
          maxLength: 256
          description: Must include uppercase, lowercase, number, and special character.
        revokeOtherSessions:
          type: boolean
          default: true
          description: Revoke all other active sessions after the password change.

    IdeaVersionMetadata:
      type: object
      required:
        - id
        - versionNumber
        - type
        - parentVersionId
        - parentVersionNumber
        - title
        - description
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        versionNumber:
          type: integer
          minimum: 1
        type:
          type: string
          enum: [INITIAL, ITERATION, PIVOT]
        parentVersionId:
          type: string
          format: uuid
          nullable: true
        parentVersionNumber:
          type: integer
          minimum: 1
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    IdeaVersionsListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/IdeaVersionMetadata'

    CreateIdeaVersionRequest:
      type: object
      required:
        - baseVersionId
        - type
      properties:
        baseVersionId:
          type: string
          format: uuid
        type:
          type: string
          enum: [ITERATION, PIVOT]

    UpdateIdeaVersionRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Version title. Leading/trailing whitespace is trimmed.
        description:
          type: string
          maxLength: 3000
          description: Optional version description. Blank values are normalized to null.

    SubscriptionStatusResponse:
