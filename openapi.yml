  /subscription/cancel:
    post:
      operationId: cancelSubscription
      summary: Cancel the authenticated user's PRO subscription
      description: |
        Cancels the authenticated user's PRO subscription immediately.
        Calls the Payrexx API to stop billing and updates the local subscription state to CANCELLED.
        Idempotent: returns existing cancelled record if already cancelled.
        Rate limited to 5 requests per 60 seconds per user.
      tags:
        - Subscription
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Subscription cancelled successfully
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
