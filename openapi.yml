openapi: '3.0.3'
info:
  title: Idea Validation Platform API
  version: '1.0'
  description: API specification for Idea Validation Platform API

servers:
  - url: http://localhost:3000/api

tags:
  - name: Content
    description: Read-only localized content endpoints
  - name: Auth
    description: Authentication and session management endpoints
  - name: Ideas
    description: Authenticated idea management endpoints
  - name: Idea Versions
    description: Authenticated canvas and hypothesis endpoints scoped to one idea version
  - name: Hypotheses
    description: Hypothesis-specific mutation endpoints
  - name: Experiments
    description: Singleton experiment endpoints scoped to one hypothesis
  - name: Metrics
    description: Singleton metric endpoints scoped to one hypothesis
  - name: Measurements
    description: Singleton measurement endpoints scoped to one hypothesis
  - name: Subscription
    description: User subscription status and management endpoints
  - name: Account
    description: Authenticated account management endpoints
  - name: Webhooks
    description: External provider webhook endpoints

security: []

paths:
  /content/{slug}:
    get:
      operationId: getContent
      summary: Get localized content by slug
      description: |
        Returns content for the requested slug.
        Locale resolution is cookie-based (`i18n_redirected`) with fallback to `en`.
        If localized content is missing, the endpoint falls back to English content.
      tags:
        - Content
      parameters:
        - name: slug
          in: path
          required: true
          description: Content slug path, for example `legal/privacy`.
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Content found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentDocument'
        '404':
          description: Content not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ideas:
    get:
      operationId: listIdeas
      summary: List ideas of the authenticated user
      description: |
        Returns a paginated list of ideas owned by the current authenticated user.
        Supports optional full-text query over the latest version title and description.
      tags:
        - Ideas
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          description: Number of items per page.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: q
          in: query
          required: false
          description: Optional search query (trimmed by server).
          schema:
            type: string
            maxLength: 200
      responses:
        '200':
          description: Ideas loaded successfully
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdeasListResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      operationId: createIdea
      summary: Create a new idea
      description: |
        Creates a new idea for the current authenticated user.
        Free plan users are limited to one idea.
      tags:
        - Ideas
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIdeaRequest'
      responses:
        '201':
          description: Idea created
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdeaResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Subscription limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ideas/{id}:
    get:
      operationId: getIdea
      summary: Get one idea with full version metadata
      description: |
        Returns one idea owned by the current authenticated user.
        The payload includes the latest version pointer and metadata for all idea versions.
      tags:
        - Ideas
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Idea identifier.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Idea loaded successfully
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdeaDetailResponse'
        '400':
          description: Invalid path parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Idea not found or not accessible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      operationId: deleteIdea
      summary: Delete an existing idea
      description: |
        Deletes one idea owned by the current authenticated user.
        Returns `404` when the idea does not exist for this user.
      tags:
        - Ideas
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Idea identifier.
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Idea deleted successfully
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 0
        '400':
          description: Invalid path parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Idea not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ideas/{id}/versions:
    get:
      operationId: listIdeaVersions
      summary: List all versions of an idea
      description: |
        Returns all versions for one idea owned by the current authenticated user.
        Versions are returned as metadata with creation timestamps and type information.
      tags:
        - Idea Versions
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Idea identifier.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Versions listed successfully
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdeaVersionsListResponse'
        '400':
          description: Invalid path parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Idea not found or not accessible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      operationId: createIdeaVersion
      summary: Create a new version of an idea
      description: |
        Creates a new ITERATION or PIVOT version derived from an existing base version.
        The new version inherits the canvas from the base version and can be independently modified.
      tags:
        - Idea Versions
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Idea identifier.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIdeaVersionRequest'
      responses:
        '201':
          description: Version created successfully
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdeaVersionMetadata'
        '400':
          description: Invalid path parameter or request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Idea or base version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ideas/{id}/versions/{versionId}:
    put:
      operationId: updateIdeaVersion
      summary: Update metadata of an idea version
      description: |
        Updates title and description metadata for one idea version owned by the current authenticated user.
      tags:
        - Idea Versions
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Idea identifier.
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          description: Idea version identifier.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIdeaVersionRequest'
      responses:
        '200':
          description: Version metadata updated successfully
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdeaVersionMetadata'
        '400':
          description: Invalid path parameters or request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Idea version not found or not accessible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ideas/{id}/versions/{versionId}/canvas:
    get:
      operationId: getIdeaVersionCanvas
      summary: Get the canvas for an idea version
      description: |
        Returns all canvas entries for one idea version owned by the current authenticated user.
        Access is restricted by both authentication and ownership.
      tags:
        - Idea Versions
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Idea identifier.
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          description: Idea version identifier.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Canvas loaded successfully
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdeaVersionCanvasResponse'
        '400':
          description: Invalid path parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Idea version not found or not accessible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      operationId: replaceIdeaVersionCanvas
      summary: Replace the entire canvas for an idea version
      description: |
        Replaces the complete canvas snapshot for one idea version owned by the current authenticated user.
        The full snapshot is persisted atomically and returned in normalized form.
      tags:
        - Idea Versions
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Idea identifier.
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          description: Idea version identifier.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceIdeaVersionCanvasRequest'
      responses:
        '200':
          description: Canvas replaced successfully
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdeaVersionCanvasResponse'
        '400':
          description: Invalid path parameter or request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Idea version not found or not accessible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ideas/{id}/versions/{versionId}/hypotheses:
    get:
      operationId: listIdeaVersionHypotheses
      summary: List hypotheses for an idea version
      description: |
        Returns all hypotheses for one specific idea version owned by the current authenticated user.
        Access is restricted by both authentication and ownership.
      tags:
        - Hypotheses
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Idea identifier.
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          description: Idea version identifier.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Hypotheses loaded successfully
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HypothesesListResponse'
        '400':
          description: Invalid path parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Idea version not found or not accessible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      operationId: createIdeaVersionHypothesis
      summary: Create a hypothesis in an idea version
      description: |
        Creates one hypothesis in a specific idea version owned by the current authenticated user.
        The server trims the statement and deduplicates canvas section links before persisting.
      tags:
        - Hypotheses
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Idea identifier.
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          description: Idea version identifier.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHypothesisRequest'
      responses:
        '201':
          description: Hypothesis created
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HypothesisResponse'
        '400':
          description: Invalid path parameter or request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Idea version not found or not accessible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ideas/{id}/versions/{versionId}/validation:
    get:
      operationId: getIdeaVersionValidationOverview
      summary: Get validation summary for an idea version
      description: |
        Returns aggregated validation counts for the current authenticated user's idea version.
        The summary groups hypotheses by status, priority, evidence type, and uncertainty dimension.
      tags:
        - Idea Versions
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Idea identifier.
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          description: Idea version identifier.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Validation summary loaded successfully
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdeaVersionValidationOverviewResponse'
        '400':
          description: Invalid path parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Idea version not found or not accessible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          headers:
            Retry-After:
              schema:
                type: integer
                minimum: 1
              description: Seconds until the next request is allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /hypotheses/{hypothesisId}:
    get:
      operationId: getHypothesis
      summary: Get one hypothesis
      description: |
        Returns one hypothesis owned by the current authenticated user.
      tags:
        - Hypotheses
      security:
        - cookieAuth: []
      parameters:
        - name: hypothesisId
          in: path
          required: true
          description: Hypothesis identifier.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Hypothesis loaded successfully
          headers:
            RateLimit-Policy:
              schema:
                type: string
              description: Current policy in `limit;w=windowSeconds` format.
            RateLimit-Limit:
              schema:
                type: integer
                minimum: 1
            RateLimit-Remaining:
              schema:
                type: integer
                minimum: 0
            RateLimit-Reset:
              schema:
                type: integer
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HypothesisResponse'
        '400':
          description: Invalid path parameter
          content:
